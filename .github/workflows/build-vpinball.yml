name: Build vpinball package

on:
  workflow_dispatch:
    inputs:
      vpinball_ref:
        description: Branch, tag, or commit from vpinball/vpinball
        required: true
        default: master
      package_revision:
        description: Debian package revision
        required: true
        default: "1"
      suite:
        description: Debian suite/codename
        required: true
        default: trixie

permissions:
  contents: write

concurrency:
  group: build-vpinball-package
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build and repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            apt-utils \
            autoconf \
            automake \
            bison \
            build-essential \
            cmake \
            curl \
            dpkg-dev \
            file \
            git \
            gnupg \
            libasound2-dev \
            libdrm-dev \
            libegl-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libpipewire-0.3-dev \
            libtool \
            libudev-dev \
            libwayland-dev \
            libwayland-egl-backend-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            nasm \
            pkg-config \
            zlib1g-dev

      - name: Build vpinball .deb
        env:
          VPINBALL_REPO_URL: https://github.com/vpinball/vpinball.git
          VPINBALL_REF: ${{ inputs.vpinball_ref }}
          PACKAGE_REVISION: ${{ inputs.package_revision }}
          OUTDIR: ${{ github.workspace }}/pool/main/v/vpinball
        run: scripts/build-vpinball-deb.sh

      - name: Import signing key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          if [ -n "$APT_SIGNING_KEY" ]; then
            install -d -m 700 ~/.gnupg
            printf '%s\n' "$APT_SIGNING_KEY" | gpg --batch --import
            echo "SIGN_REPO=1" >> "$GITHUB_ENV"
          else
            echo "No APT_SIGNING_KEY secret configured; Release metadata will not be signed."
          fi

      - name: Update repository metadata
        env:
          SUITE: ${{ inputs.suite }}
          COMPONENT: main
        run: scripts/update-apt-repo.sh

      - name: Commit package and repository metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pool repo
          if git diff --cached --quiet; then
            echo "No package or repository metadata changes to commit."
          else
            git commit -m "Add vpinball package ${{ inputs.vpinball_ref }}"
            git push
          fi
