name: Build vpinfe package

on:
  workflow_dispatch:
    inputs:
      vpinfe_version:
        description: VPinFE release tag, or latest
        required: true
        default: latest
      vpinfe_triplet:
        description: Linux release asset triplet
        required: true
        default: linux-x64
        type: choice
        options:
          - linux-x64
          - linux-x64-slim
          - linux-arm64
          - linux-arm64-slim
      package_revision:
        description: Debian package revision
        required: true
        default: "1"
      suite:
        description: Debian suite/codename
        required: true
        default: trixie

permissions:
  contents: write

concurrency:
  group: build-vpinfe-package-${{ inputs.vpinfe_triplet }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install packaging and repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            apt-utils \
            curl \
            dpkg-dev \
            gnupg \
            jq \
            unzip

      - name: Build vpinfe .deb from release asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VPINFE_REPO: superhac/vpinfe
          VPINFE_VERSION: ${{ inputs.vpinfe_version }}
          VPINFE_TRIPLET: ${{ inputs.vpinfe_triplet }}
          PACKAGE_REVISION: ${{ inputs.package_revision }}
          OUTDIR: ${{ github.workspace }}/pool/main/v/vpinfe
        run: scripts/build-vpinfe-deb.sh

      - name: Import signing key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          if [ -z "$APT_SIGNING_KEY" ]; then
            echo "::error::APT_SIGNING_KEY secret is required to sign repository metadata."
            exit 1
          fi
          install -d -m 700 ~/.gnupg
          printf '%s\n' "$APT_SIGNING_KEY" | gpg --batch --import
          echo "SIGN_REPO=1" >> "$GITHUB_ENV"

      - name: Update repository metadata
        env:
          SUITE: ${{ inputs.suite }}
          COMPONENT: main
        run: scripts/update-apt-repo.sh

      - name: Commit package and repository metadata
        env:
          COMMIT_MESSAGE: Add vpinfe package ${{ inputs.vpinfe_version }} ${{ inputs.vpinfe_triplet }}
          SUITE: ${{ inputs.suite }}
          COMPONENT: main
        run: scripts/commit-repo-changes.sh
